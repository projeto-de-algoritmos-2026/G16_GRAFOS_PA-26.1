<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMAZONAS EXPRESS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="css/styles.css?v=route-anim" />
  </head>
  <body>
    <header>
      <h1>AMAZONAS EXPRESS</h1>
      <div class="controls" role="group" aria-label="Menor caminho entre CDs (Dijkstra)">
        <label class="controls__field">
          <span>CD origem</span>
          <select id="select-origin" aria-label="CD de origem"></select>
        </label>
        <label class="controls__field">
          <span>CD destino</span>
          <select id="select-dest" aria-label="CD de destino"></select>
        </label>
        <button type="button" id="btn-calc-route" class="btn btn--primary">Calcular menor caminho</button>
        <button type="button" id="btn-toggle-mst" class="btn">Mostrar MST (Kruskal)</button>
      </div>
      <div class="controls controls--sim" role="group" aria-label="Editar arestas">
        <label class="controls__field">
          <span>Modo no mapa</span>
          <select id="select-mode" aria-label="Modo de interação no mapa">
            <option value="nav" selected>Navegar (clique em CD = define origem)</option>
            <option value="link">Ligar dois nós (dois cliques em marcadores)</option>
            <option value="remove-edge">Remover aresta (clique na linha)</option>
          </select>
        </label>
        <label class="controls__field">
          <span>Aresta (lista)</span>
          <select id="select-edge" aria-label="Selecionar aresta para remover"></select>
        </label>
        <button type="button" id="btn-edge-remove" class="btn">Remover aresta selecionada</button>
      </div>
    </header>
    <div id="map" role="application" aria-label="Mapa da malha logística"></div>
    <footer>
      <section class="metrics" id="metrics" aria-label="Métricas dos algoritmos">
        <div class="metrics__item">
          <span class="metrics__label">Dijkstra (CD → CD)</span>
          <span class="metrics__value" id="metric-dijkstra">—</span>
        </div>
        <div class="metrics__item">
          <span class="metrics__label">MST Kruskal (entre CDs)</span>
          <span class="metrics__value" id="metric-mst">—</span>
        </div>
      </section>
      <p id="status" class="footer__status">Carregando grafo…</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
